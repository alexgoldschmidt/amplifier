# Handle PR Vote Change Recipe
# Triggered when reviewer votes change (approve, reject, wait)
#
# Behavior:
# 1. Check new vote status
# 2. If all approvals met: comment that PR is ready to merge
# 3. If rejected/changes requested: fetch the feedback and respond

name: handle-pr-vote-change
description: |
  Handle PR vote changes - check approval status and respond accordingly.

context:
  required:
    - org
    - project
    - repo
    - pr_id
    - voter_name
    - vote_type      # "approved", "rejected", "waitingForAuthor", "noVote"
  optional:
    - vote_comment   # Comment left with the vote

steps:
  - name: check-approval-status
    agent: azure-devops:ado-pr-manager
    instruction: |
      Check the current approval status of PR #{{pr_id}}:
      
      Org: {{org}}
      Project: {{project}}
      Repo: {{repo}}
      
      Get:
      1. All reviewer votes (who approved, who rejected, who's waiting)
      2. Required reviewers vs optional
      3. Policy status (are all required policies satisfied?)
      4. Build status
      
      Return:
      - all_required_approved: true/false
      - blocking_reviewers: [list of names]
      - policy_status: pass/fail
      - build_status: pass/fail/running

  - name: respond-to-vote
    agent: azure-devops:ado-pr-manager
    instruction: |
      Vote change detected on PR #{{pr_id}}:
      
      Voter: {{voter_name}}
      Vote: {{vote_type}}
      Comment: {{vote_comment}}
      
      Current status:
      {{steps.check-approval-status.output}}
      
      ## Actions Based on Vote
      
      **If vote_type is "approved" AND all_required_approved:**
      - Comment: "All required approvals received. PR is ready to merge."
      - Do NOT auto-merge (leave that to human)
      
      **If vote_type is "rejected" or "waitingForAuthor":**
      - If vote_comment exists: analyze what changes are requested
      - Comment acknowledging the feedback
      - If changes are clear and actionable: make the changes and push
      - Reply: "Addressed feedback in commit [sha]" or "Need clarification on [specific point]"
      
      **If vote_type is "noVote" (vote removed):**
      - No action needed, just log
      
      Report what action was taken.
