# Handle PR Build Failure Recipe
# Triggered when a PR's CI/build status changes to failed
#
# Execution Strategy:
# - If you are the PR author → Use worktree to fix and push
# - If you are a reviewer → Comment only (inform author)
# - Worktrees enable parallel handling of multiple PRs simultaneously

name: handle-pr-build-failure
description: |
  Diagnose PR build/test failures and attempt fixes.
  Uses worktrees for code changes to enable parallel PR handling.

context:
  required:
    - org
    - project
    - repo
    - pr_id
    - build_id       # Build ID that failed
    - failure_type   # "build", "test", "policy"
  optional:
    - build_url      # Link to build details
    - repo_path      # Local path to the repository

steps:
  - name: determine-role-and-fetch-details
    agent: azure-devops:ado-pr-manager
    instruction: |
      Fetch PR context and build failure details:
      
      Org: {{org}}
      Project: {{project}}
      Repo: {{repo}}
      PR ID: {{pr_id}}
      Build ID: {{build_id}}
      
      Get:
      1. PR author - who created this PR?
      2. Am I the author or a reviewer?
      3. Source branch name
      4. Which stage/job failed
      5. Error message and relevant log snippet
      6. Files changed in the PR
      
      Return JSON:
      {
        "pr_author": "<author>",
        "i_am_author": true/false,
        "source_branch": "<branch>",
        "failure_stage": "<stage name>",
        "error_message": "<error>",
        "log_snippet": "<relevant logs>",
        "changed_files": ["<files>"]
      }

  - name: diagnose-and-fix
    agent: foundation:bug-hunter
    instruction: |
      Context: {{steps.determine-role-and-fetch-details.output}}
      
      Failure Type: {{failure_type}}
      
      ## Execution Strategy Decision
      
      **If i_am_author is FALSE (I'm a reviewer):**
      - ONLY comment on the PR to inform the author
      - Provide diagnosis but do NOT make code changes
      - Use `az repos pr comment` to post analysis
      
      **If i_am_author is TRUE:**
      - Use WORKTREE strategy for isolation:
      
      ```bash
      # 1. Create/reuse worktree for this PR
      PR_BRANCH="{{source_branch}}"
      WORKTREE_PATH="../{{repo}}-pr-{{pr_id}}"
      
      # Check if worktree already exists
      if [ -d "$WORKTREE_PATH" ]; then
        cd "$WORKTREE_PATH"
        git fetch origin "$PR_BRANCH"
        git checkout "$PR_BRANCH"
        git pull origin "$PR_BRANCH"
      else
        git fetch origin "$PR_BRANCH"
        git worktree add "$WORKTREE_PATH" "origin/$PR_BRANCH"
        cd "$WORKTREE_PATH"
      fi
      
      # 2. Diagnose and fix in the worktree
      ```
      
      ## Fix Decision Framework
      
      1. **If compilation/build error:**
         - Identify the syntax/type error
         - Fix the code in worktree
         - Commit and push
      
      2. **If test failure:**
         - Identify which test failed and why
         - If test is correct and code is wrong: fix the code
         - If test is flaky/outdated: note for manual review
         - Commit fix and push
      
      3. **If policy failure (formatting, linting):**
         - Run the fixer (ruff, prettier, etc.)
         - Commit and push
      
      4. **If infrastructure/environment issue:**
         - Don't attempt fix
         - Comment documenting the issue
      
      ```bash
      # 3. If fix applied, commit and push from worktree
      git add .
      git commit -m "Fix build failure: <brief description>
      
      Fixes {{failure_type}} failure in build {{build_id}}"
      git push origin "$PR_BRANCH"
      ```
      
      Report:
      - diagnosis: what went wrong
      - action_taken: "fixed and pushed" or "requires manual intervention" or "commented (reviewer only)"
      - commit_sha: if fix was pushed

  - name: comment-on-pr
    agent: azure-devops:ado-pr-manager
    instruction: |
      Post a comment on PR #{{pr_id}} summarizing:
      
      {{steps.diagnose-and-fix.output}}
      
      Format the comment professionally:
      - Start with "Build failure analysis:"
      - Explain what failed and why
      - If fixed: "Fixed in commit [sha]"
      - If not fixable automatically: "Requires manual attention: [reason]"
      - If reviewer-only: "Diagnosis for author's reference: [details]"
      
      Note: Do NOT remove worktree - keep for future PR work
