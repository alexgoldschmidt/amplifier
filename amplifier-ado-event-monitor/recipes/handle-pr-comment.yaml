# Handle PR Comment Recipe
# Triggered when a PR receives new review comments
#
# Execution Strategy:
# - If you are the PR author AND code changes needed → Use worktree
# - If you are a reviewer → Comment only (no code changes)
# - Worktrees enable parallel handling of multiple PRs simultaneously

name: handle-pr-comment
description: |
  Analyze PR review comments and take appropriate action.
  Uses worktrees for code changes to enable parallel PR handling.

context:
  required:
    - org           # e.g., "msazure"
    - project       # e.g., "One"
    - repo          # e.g., "PriceDerivationEngine"
    - pr_id         # PR number
    - thread_id     # Comment thread ID
    - comment_id    # Specific comment ID
    - comment_author
    - comment_text
  optional:
    - file_path     # File the comment is on (if inline comment)
    - line_number   # Line number (if inline comment)
    - repo_path     # Local path to the repository

steps:
  - name: determine-role-and-context
    agent: azure-devops:ado-pr-manager
    instruction: |
      Fetch PR context and determine execution strategy:
      
      Org: {{org}}
      Project: {{project}}
      Repo: {{repo}}
      PR ID: {{pr_id}}
      
      Get:
      1. PR author - who created this PR?
      2. Am I the author or a reviewer?
      3. PR title, description, and source branch name
      4. The full comment thread (thread_id: {{thread_id}})
      5. File/line context if inline comment:
         - File: {{file_path}}
         - Line: {{line_number}}
      
      Return JSON:
      {
        "pr_author": "<author name>",
        "i_am_author": true/false,
        "source_branch": "<branch name>",
        "target_branch": "<target branch>",
        "thread_context": "<full thread>",
        "requires_code_change": true/false (based on comment analysis)
      }

  - name: analyze-and-act
    agent: azure-devops:ado-pr-responder
    instruction: |
      Context from previous step:
      {{steps.determine-role-and-context.output}}
      
      Comment by: {{comment_author}}
      Comment text: {{comment_text}}
      
      ## Execution Strategy Decision
      
      **If i_am_author is FALSE (I'm a reviewer):**
      - ONLY comment - do not make code changes
      - Reply to thread with analysis, suggestions, or answers
      - Use `az repos pr comment` to post reply
      
      **If i_am_author is TRUE AND requires_code_change is TRUE:**
      - Use WORKTREE strategy for isolation:
      
      ```bash
      # 1. Create/reuse worktree for this PR
      PR_BRANCH="{{source_branch}}"
      WORKTREE_PATH="../{{repo}}-pr-{{pr_id}}"
      
      # Check if worktree already exists
      if [ -d "$WORKTREE_PATH" ]; then
        cd "$WORKTREE_PATH"
        git fetch origin "$PR_BRANCH"
        git checkout "$PR_BRANCH"
        git pull origin "$PR_BRANCH"
      else
        # Create new worktree
        git fetch origin "$PR_BRANCH"
        git worktree add "$WORKTREE_PATH" "origin/$PR_BRANCH"
        cd "$WORKTREE_PATH"
      fi
      
      # 2. Make the requested changes in the worktree
      # ... edit files ...
      
      # 3. Commit and push from worktree
      git add .
      git commit -m "Address review feedback: <brief description>
      
      Addresses comment in thread {{thread_id}}"
      git push origin "$PR_BRANCH"
      
      # 4. Reply to thread with commit reference
      ```
      
      **If i_am_author is TRUE AND requires_code_change is FALSE:**
      - Just reply to the comment thread
      - Answer questions, acknowledge feedback, etc.
      
      ## Reply Guidelines
      - Always reply to the comment thread
      - If code changes made: "Done in commit [sha]. [description]"
      - If question: Provide clear answer
      - If unclear: Ask for clarification
      
      Report: action taken, commit sha (if applicable), reply posted

  - name: cleanup-and-verify
    agent: azure-devops:ado-pr-manager
    instruction: |
      Verify the action completed successfully:
      
      Based on: {{steps.analyze-and-act.output}}
      
      1. If code was pushed: verify commit appears on PR
      2. Confirm reply was posted to thread {{thread_id}}
      3. Note: Do NOT remove worktree - keep for future PR comments
      
      Report final status.
