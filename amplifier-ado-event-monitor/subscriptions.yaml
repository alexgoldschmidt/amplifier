# ADO Event Monitor - Alex's Subscriptions
#
# Discovery: Automatically finds PRs/work items assigned to you
# Subscriptions: Explicit items to track (regardless of assignment)

# Authors to ignore (prevents infinite loops from our own actions)
ignore_authors:
  - "Amplifier Bot"
  - "amplifier[bot]"
  - "GitHub Copilot"

# Dynamic discovery - finds entities assigned to @Me
discovery:
  pull_requests:
    # PRs where I'm a reviewer
    - org: msazure
      project: One
      repo: PriceDerivationEngine
      filter: assigned_to_me
      poll_interval: 60s
    
  work_items:
    # Work items assigned to me in each project
    - org: msazure
      project: One
      filter: assigned_to_me
      poll_interval: 120s
    
    - org: ceplanning
      project: commerce and ecosystems planning
      filter: assigned_to_me
      poll_interval: 120s

# Static subscriptions - explicit items to track (add specific PRs/WIs here)
subscriptions: []
  # Example: Track a specific PR you don't own but need to follow
